<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento do Laboratório</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<header>

<h1 class="titulo">
<img src="brasao.jpg" class="logo">
CETI Landri Sales
</h1>

<p>Sistema de Agendamento do Laboratório</p>

</header>

<div class="container">

<div class="formulario">

<h2>📅 Novo Agendamento</h2>

<input id="professor" placeholder="👨‍🏫 Professor">

<input id="turma" placeholder="🎓 Turma">

<select id="dia">
<option>Segunda</option>
<option>Terça</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
</select>

<select id="horario">

<option value="07:00">07:00 - 08:00</option>
<option value="08:00">08:00 - 09:00</option>
<option value="09:15">09:15 - 10:15</option>
<option value="10:15">10:15 - 11:15</option>
<option value="11:15">11:15 - 12:00</option>
<option value="13:00">13:00 - 14:00</option>
<option value="14:00">14:00 - 15:00</option>
<option value="15:15">15:15 - 16:15</option>

</select>

<button onclick="agendar()">Agendar</button>

</div>

<h2>🧾 Agenda Semanal do Laboratório</h2>

<button class="pdf" onclick="baixarPDF()">📄 Baixar Agenda em PDF</button>

<table>

<tr>
<th>Horário</th>
<th>Seg</th>
<th>Ter</th>
<th>Qua</th>
<th>Qui</th>
<th>Sex</th>
</tr>

<tbody id="tabelaAgenda"></tbody>

</table>

</div>

<footer>
Criado pelo aluno Sebastião Martins — 3º A TDS
</footer>

<script src="script.js"></script>

</body>
</html>
