<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento do Laboratório</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<header>
<h1>🧪 CETI Landri Sales</h1>
<p>Sistema de Agendamento do Laboratório</p>
</header>

<div class="container">

<div class="formulario">

<h2>📅 Novo Agendamento</h2>

<input id="professor" placeholder="👨‍🏫 Professor">

<input id="turma" placeholder="🎓 Turma">

<select id="dia">
<option>Segunda</option>
<option>Terça</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
</select>

<select id="horario">
<option>07:00</option>
<option>08:00</option>
<option>09:15</option>
<option>10:15</option>
<option>11:15</option>
<option>13:00</option>
<option>14:00</option>
<option>15:15</option>
</select>

<button onclick="agendar()">✅ Agendar</button>

</div>

<h2>🧾 Agenda Semanal do Laboratório</h2>

<button class="pdf" onclick="gerarPDF()">📄 Baixar Agenda em PDF</button>

<table id="tabela">

<tr>
<th>⏰ Horário</th>
<th>Seg</th>
<th>Ter</th>
<th>Qua</th>
<th>Qui</th>
<th>Sex</th>
</tr>

</table>

</div>

<footer>
Criado pelo aluno Sebastião Martins — 3º A TDS
</footer>

<script src="script.js"></script>

</body>
</html>
