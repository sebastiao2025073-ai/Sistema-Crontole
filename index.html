<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamento do Laboratório</title>
<style>
body{font-family:Arial;margin:0;background:#e8f5e9;}
header{background:#1b5e20;color:white;padding:20px;display:flex;justify-content:center;align-items:center;}
header h1{margin:0;}
.container{padding:25px;}
.formulario{background:white;padding:20px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);margin-bottom:30px;}
input,select{padding:10px;margin:5px;width:180px;}
button{background:#2e7d32;border:none;color:white;padding:10px 15px;border-radius:5px;cursor:pointer;}
button:hover{background:#1b5e20;}
.pdf{background:#43a047;font-size:13px;padding:7px 12px;margin-bottom:12px;opacity:1;}
.pdf:hover{background:#2e7d32;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{border:1px solid #ddd;padding:10px;text-align:center;}
th{background:#66bb6a;color:white;}
.agendamento{font-size:12px;}
.excluir{background:#c62828;margin-top:5px;}
footer{background:#1b5e20;color:white;text-align:center;padding:12px;margin-top:30px;font-size:14px;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<header><h1>CETI Landri Sales</h1></header>

<div class="container">
  <div class="formulario">
    <h2>Novo Agendamento</h2>
    <input id="professor" placeholder="Professor">
    <input id="turma" placeholder="Turma">
    <select id="dia">
      <option>Segunda</option>
      <option>Terça</option>
      <option>Quarta</option>
      <option>Quinta</option>
      <option>Sexta</option>
    </select>
    <select id="horario">
      <option>07:00</option>
      <option>08:00</option>
      <option>09:15</option>
      <option>10:15</option>
      <option>11:15</option>
      <option>13:00</option>
      <option>14:00</option>
      <option>15:15</option>
    </select>
    <button onclick="agendar()">Agendar</button>
  </div>

  <h2>Agenda Semanal do Laboratório</h2>
  <button class="pdf" onclick="gerarPDF()">Baixar Agenda em PDF</button>

  <table id="tabela">
    <tr>
      <th>Horário</th>
      <th>Seg</th>
      <th>Ter</th>
      <th>Qua</th>
      <th>Qui</th>
      <th>Sex</th>
    </tr>
  </table>
</div>

<script>
/* RESET AUTOMÁTICO DA SEMANA */
function getSemana(){
  let hoje = new Date();
  let inicio = new Date(hoje.getFullYear(),0,1);
  let dias = Math.floor((hoje - inicio) / (24*60*60*1000));
  return Math.ceil((dias + inicio.getDay()+1)/7);
}

let semanaAtual = getSemana();
let semanaSalva = localStorage.getItem("semana");

if(semanaSalva != semanaAtual){
  localStorage.clear();
  localStorage.setItem("semana", semanaAtual);
}

/* CONFIGURAÇÕES */
const dias=["Segunda","Terça","Quarta","Quinta","Sexta"];
const horarios=["07:00","08:00","09:15","10:15","11:15","13:00","14:00","15:15"];

/* CARREGAR TABELA */
window.onload=function(){
  let tabela=document.getElementById("tabela");
  horarios.forEach(h=>{
    let linha="<tr>";
    linha+=`<td>${h}</td>`;
    dias.forEach(d=>{
      let chave=d+"-"+h;
      let ag=localStorage.getItem(chave);
      if(ag){
        linha+=`<td class="agendamento">${ag}<br><button class="excluir" onclick="remover('${chave}')">Excluir</button></td>`;
      }else{
        linha+="<td>-</td>";
      }
    });
    linha+="</tr>";
    tabela.innerHTML+=linha;
  });
}

/* AGENDAR */
function agendar(){
  let professor=document.getElementById("professor").value;
  let turma=document.getElementById("turma").value;
  let dia=document.getElementById("dia").value;
  let horario=document.getElementById("horario").value;
  let chave=dia+"-"+horario;
  localStorage.setItem(chave,professor+" ("+turma+")");
  location.reload();
}

/* REMOVER */
function remover(chave){
  localStorage.removeItem(chave);
  location.reload();
}

/* GERAR PDF */
function gerarPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();
  doc.setFontSize(18);
  doc.text("Agenda Semanal do Laboratório",14,15);
  doc.setFontSize(12);
  doc.text("CETI Landri Sales",14,22);

  let tabelaData=[];
  horarios.forEach(h=>{
    let linha=[h];
    dias.forEach(d=>{
      let chave=d+"-"+h;
      let ag=localStorage.getItem(chave);
      linha.push(ag ? ag : "-");
    });
    tabelaData.push(linha);
  });

  doc.autoTable({
    startY:30,
    head:[["Horário","Segunda","Terça","Quarta","Quinta","Sex"]],
    body:tabelaData,
    theme:"grid",
    headStyles:{fillColor:[27,94,32]},
    styles:{halign:"center"}
  });
  doc.save("agenda-laboratorio.pdf");
}
</script>

<footer>Criado pelo aluno Sebastião Martins — 3º A TDS</footer>
</body>
</html>
